<style>
  :root {
    --pitch: #0d2818;
    --pitch-dark: #050f08;
    --line: #1f4a30;
    --gold: #e8b84b;
    --gold-bright: #ffd166;
    --gold-dim: #b88f2f;
    --white: #f3f6f1;
    --red: #ff5d4d;
    --green-ok: #3ddc84;
    --glass: rgba(255,255,255,0.055);
    --glass-border: rgba(255,255,255,0.09);
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background: radial-gradient(circle at 50% -10%, #123a22 0%, var(--pitch-dark) 55%);
    color: var(--white);
    font-family: 'Inter', 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding-bottom: 50px;
    -webkit-font-smoothing: antialiased;
  }

  @keyframes fadeUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

  .lang-bar {
    display: flex; justify-content: center; gap: 6px;
    padding: 10px 16px 0;
  }
  .lang-bar button {
    background: var(--glass); border: 1px solid var(--glass-border);
    color: #cfd8d1; font-size: 0.75rem; font-weight: 700;
    padding: 5px 12px; border-radius: 20px; cursor: pointer; width: auto;
  }
  .lang-bar button.active { background: var(--gold); color: #1a1208; border-color: var(--gold); }

  header {
    position: relative;
    text-align: center;
    padding: 26px 16px 22px;
    overflow: hidden;
  }
  header::before, header::after {
    content: "";
    position: absolute;
    top: -50px;
    width: 280px;
    height: 280px;
    background: conic-gradient(from 200deg, rgba(255,209,102,0.18), transparent 38deg);
    pointer-events: none;
  }
  header::before { left: -70px; transform: rotate(8deg); }
  header::after { right: -70px; transform: scaleX(-1) rotate(8deg); }

  header h1 {
    position: relative;
    margin: 0;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 2.15rem;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    background: linear-gradient(180deg, var(--gold-bright), var(--gold-dim));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 2px 0 rgba(0,0,0,0.6));
  }
  header p { position: relative; margin: 8px 0 0; color: #9fb3a4; font-size: 0.85rem; letter-spacing: 0.3px; }

  .scoreboard {
    max-width: 430px;
    margin: 14px auto;
    background: var(--glass);
    backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 14px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    animation: fadeUp 0.5s ease both;
  }
  .scoreboard > div { text-align: center; flex: 1; }
  .scoreboard .label { font-size: 0.62rem; letter-spacing: 1.4px; color: #8aa090; text-transform: uppercase; }
  .scoreboard .value {
    font-family: 'Oswald', sans-serif;
    font-variant-numeric: tabular-nums;
    font-size: 1.5rem;
    color: var(--gold-bright);
    font-weight: 600;
  }

  main { max-width: 430px; margin: 0 auto; padding: 0 16px; }

  .card {
    background: var(--glass);
    backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    animation: fadeUp 0.45s ease both;
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
  }
  .card h2 {
    margin: 0 0 12px;
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    letter-spacing: 0.3px;
    font-size: 1.12rem;
    color: var(--gold-bright);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card p.desc { color: #a3b3a8; font-size: 0.85rem; margin-top: -4px; margin-bottom: 14px;}

  button {
    font-family: 'Inter', sans-serif;
    border: none;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    transition: transform 0.12s ease, filter 0.15s ease, box-shadow 0.15s ease;

  button:active { transform: scale(0.965); }
  .btn-primary {

  .option.selected { border-color: var(--gold); background: rgba(232,184,75,0.14); }

  .quiz-nav { display: flex; justify-content: space-between; gap: 10px; margin-top: 8px; }
  .quiz-nav button { width: auto; flex: 1; }

  .wheel-zone { text-align: center; }
  .wheel-wrap { position: relative; width: 220px; margin: 0 auto 18px; }
  .wheel-wrap svg { display: block; filter: drop-shadow(0 8px 18px rgba(0,0,0,0.5)); }
  .wheel-pointer {
    position: absolute; top: -10px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 11px solid transparent;
    border-right: 11px solid transparent;
    border-top: 18px solid var(--gold-bright);
    filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5));
    z-index: 2;
  }
  #wheelSvg { transition: transform 3.2s cubic-bezier(0.15, 0.85, 0.2, 1); }

    border-radius: 14px;

    margin-bottom: 14px;
    text-align: center;

  .goal-frame {

    border-bottom: none;
    height: 90px;

// ===== ROUE (SVG) =====
function buildWheelSegments() {
  const total = WHEEL_WEIGHTS.reduce((a, b) => a + b, 0);
  let acc = 0;
  return WHEEL_WEIGHTS.map((w, i) => {
    const start = acc;
    const sweep = (w / total) * 360;
    acc += sweep;
    return { start, end: acc, mid: start + sweep / 2, prize: WHEEL_PRIZES[i], color: WHEEL_COLORS[i] };
  });
}
