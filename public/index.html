<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foot Quiz Pi</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a1a0f;
    color: white;
    font-family: Arial, sans-serif;
    min-height: 100vh;
    padding: 15px;
  }
  button {
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    margin: 5px 0;
  }
  button:active { transform: scale(0.96); }
  
  .btn-yellow { background: #e8b84b; color: #1a1208; }
  .btn-purple { background: #8c3ce0; color: white; }
  .btn-green { background: #3ddc84; color: #1a1208; }
  
  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 20px;
    margin: 10px auto;
    max-width: 400px;
  }
  .card h2 { color: #e8b84b; margin-bottom: 10px; }
  .card p { color: #aaa; margin-bottom: 15px; font-size: 14px; }
  
  .scoreboard {
    display: flex;
    justify-content: space-around;
    background: rgba(255,255,255,0.05);
    border-radius: 16px;
    padding: 15px;
    max-width: 400px;
    margin: 0 auto 15px;
  }
  .scoreboard div { text-align: center; }
  .scoreboard .label { font-size: 11px; color: #888; }
  .scoreboard .value { font-size: 22px; color: #ffd166; font-weight: 700; }
  
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #ffd166;
    color: #1a1208;
    padding: 12px 20px;
    border-radius: 10px;
    font-weight: 700;
    z-index: 999;
    display: none;
  }
  .toast.show { display: block; }
  
  .option-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid #2a4a30;
    color: white;
    text-align: left;
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
    margin: 4px 0;
  }
  .option-btn.selected { border-color: #e8b84b; background: rgba(232,184,75,0.15); }
  
  .ad-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.95);
    z-index: 1000;
    text-align: center;
    padding-top: 40%;
  }
  .ad-overlay.show { display: block; }
</style>
</head>
<body>

<h1 style="text-align:center; color:#ffd166;">⚽ Foot Quiz Pi</h1>

<div class="scoreboard">
  <div>
    <div class="label">JOUEUR</div>
    <div class="value" id="nameDisplay">—</div>
  </div>
  <div>
    <div class="label">POINTS</div>
    <div class="value" id="ptsDisplay">0</div>
  </div>
  <div>
    <div class="label">SÉRIE</div>
    <div class="value" id="streakDisplay">0</div>
  </div>
</div>

<!-- LOGIN - VERSION SIMPLE -->
<div class="card" id="cardLogin">
  <h2>🔐 Connexion</h2>
  <p>Entre ton pseudo pour jouer</p>
  <input type="text" id="pseudoInput" placeholder="Ton pseudo..." 
         style="width:100%; padding:14px; border-radius:10px; border:1px solid #e8b84b; 
                background:rgba(255,255,255,0.1); color:white; font-size:16px; margin-bottom:10px;">
  <button class="btn-yellow" id="btnPlay">⚽ JOUER !</button>
</div>

<!-- QUIZ -->
<div class="card" id="cardQuiz" style="display:none;">
  <h2>🧠 Quiz</h2>
  <p id="quizProgress">Question 1/5</p>
  <div id="quizArea"></div>
  <button class="btn-yellow" id="btnSubmitQuiz">Valider</button>
</div>

<!-- ROUE -->
<div class="card" id="cardWheel" style="display:none; text-align:center;">
  <h2>🎡 Roue</h2>
  <div style="width:180px; height:180px; margin:0 auto;">
    <svg id="wheelSvg" width="180" height="180" viewBox="0 0 100 100"></svg>
  </div>
  <button class="btn-purple" id="btnSpin">📺 Voir pub et tourner</button>
</div>

<!-- TIR -->
<div class="card" id="cardShoot" style="display:none;">
  <h2>🥅 Tir au but</h2>
  <div style="border:3px solid white; border-bottom:none; height:70px; max-width:250px; margin:0 auto; display:flex; align-items:flex-end; justify-content:center; font-size:30px;">⚽</div>
  <div style="display:flex; gap:5px; margin-top:10px;">
    <button onclick="shoot('gauche')">⬅️ Gauche</button>
    <button onclick="shoot('centre')">⬆️ Centre</button>
    <button onclick="shoot('droite')">➡️ Droite</button>
  </div>
  <p id="shootMsg" style="text-align:center; margin-top:10px;"></p>
</div>

<!-- SHOP -->
<div class="card" id="cardShop" style="display:none;">
  <h2>🛒 Boutique</h2>
  <div id="shopItems"></div>
  <p style="margin-top:10px; color:#ffd166;">🎒 Inventaire</p>
  <div id="inventoryList"></div>
</div>

<div class="toast" id="toast"></div>

<!-- OVERLAY PUB -->
<div class="ad-overlay" id="adOverlay">
  <h2 style="color:#ffd166;">📺 Publicité</h2>
  <p style="color:white; font-size:30px;" id="adCountdown">3</p>
  <p style="color:#aaa;">La roue va tourner...</p>
</div>

<script>
// ========== DONNÉES SIMPLES ==========
let name = null;
let pts = 0;
let streak = 0;
let quizDone = false;
let wheelDone = false;
let shootDone = false;
let quiz = [];
let answers = [];
let qIndex = 0;
let inventory = { extra_wheel: 0, extra_shoot: 0 };

// Charger depuis localStorage
const saved = localStorage.getItem('fqp_save');
if (saved) {
  try {
    const data = JSON.parse(saved);
    name = data.name;
    pts = data.pts;
    streak = data.streak;
    quizDone = data.quizDone;
    wheelDone = data.wheelDone;
    shootDone = data.shootDone;
    inventory = data.inventory || inventory;
  } catch(e) {}
}

// Questions
const questions = [
  { q: "Qui a gagné le Mondial 2022 ?", o: ["France","Brésil","Argentine","Allemagne"], c: 2 },
  { q: "Joueurs dans une équipe ?", o: ["9","10","11","12"], c: 2 },
  { q: "Plus de LDC ?", o: ["Barça","Real","Bayern","Liverpool"], c: 1 },
  { q: "Football codifié en ?", o: ["France","Italie","Brésil","Angleterre"], c: 3 },
  { q: "Surnom de Messi ?", o: ["CR7","Neymar","La Pulga","Mbappé"], c: 2 }
];

// Vérifier nouveau jour
const today = new Date().toDateString();
if (localStorage.getItem('fqp_date') !== today) {
  quizDone = false;
  wheelDone = false;
  shootDone = false;
  if (name) streak++;
  localStorage.setItem('fqp_date', today);
}

// ========== FONCTIONS SIMPLES ==========
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  setTimeout(() => t.className = 'toast', 2500);
}

function saveAll() {
  localStorage.setItem('fqp_save', JSON.stringify({
    name, pts, streak, quizDone, wheelDone, shootDone, inventory
  }));
  localStorage.setItem('fqp_date', today);
}

function updateUI() {
  document.getElementById('nameDisplay').textContent = name || '—';
  document.getElementById('ptsDisplay').textContent = pts;
  document.getElementById('streakDisplay').textContent = streak;
  
  document.getElementById('cardLogin').style.display = name ? 'none' : 'block';
  document.getElementById('cardQuiz').style.display = name ? 'block' : 'none';
  document.getElementById('cardWheel').style.display = name ? 'block' : 'none';
  document.getElementById('cardShoot').style.display = name ? 'block' : 'none';
  document.getElementById('cardShop').style.display = name ? 'block' : 'none';
  
  if (name && !quizDone) startQuiz();
  
  if (wheelDone) {
    document.getElementById('btnSpin').textContent = '✅ Déjà tournée';
    document.getElementById('btnSpin').disabled = true;
  }
  
  renderShop();
}

// ========== LOGIN - DIRECT ==========
document.getElementById('btnPlay').addEventListener('click', function() {
  const pseudo = document.getElementById('pseudoInput').value.trim();
  if (pseudo) {
    name = pseudo;
    toast('✅ Bienvenue ' + name + ' !');
    saveAll();
    updateUI();
  } else {
    toast('⚠️ Entre un pseudo !');
  }
});

// ========== QUIZ ==========
function startQuiz() {
  quiz = [...questions].sort(() => Math.random() - 0.5);
  answers = [null, null, null, null, null];
  qIndex = 0;
  showQuestion();
}

function showQuestion() {
  const q = quiz[qIndex];
  document.getElementById('quizProgress').textContent = 'Question ' + (qIndex+1) + '/5';
  
  let h = '<p style="font-weight:700;">' + q.q + '</p>';
  q.o.forEach((opt, i) => {
    h += '<button class="option-btn' + (answers[qIndex] === i ? ' selected' : '') + '" onclick="pickAnswer(' + i + ')">' + opt + '</button>';
  });
  document.getElementById('quizArea').innerHTML = h;
}

function pickAnswer(i) {
  answers[qIndex] = i;
  showQuestion();
}

document.getElementById('btnSubmitQuiz').addEventListener('click', function() {
  if (answers.includes(null)) {
    toast('⚠️ Réponds à toutes les questions');
    return;
  }
  
  let correct = 0;
  quiz.forEach((q, i) => { if (answers[i] === q.c) correct++; });
  
  pts += correct * 10;
  quizDone = true;
  
  toast('🎉 ' + correct + '/5 • +' + (correct*10) + ' pts !');
  saveAll();
  updateUI();
});

// ========== ROUE ==========
function drawWheel() {
  const prizes = [5,10,15,20,25,50,100];
  const colors = ['#1d3322','#234027','#2c4f30','#3a5c33','#b88f2f','#e8b84b','#ff5d4d'];
  const weights = [25,25,20,15,10,4,1];
  const sum = weights.reduce((a,b) => a+b, 0);
  let acc = 0, svg = '';
  
  weights.forEach((w, i) => {
    const start = acc, sweep = (w/sum)*360;
    acc += sweep;
    const end = acc, mid = start + sweep/2;
    const r1 = (start-90)*Math.PI/180, r2 = (end-90)*Math.PI/180, rm = (mid-90)*Math.PI/180;
    svg += '<path d="M50,50 L'+(50+45*Math.cos(r1))+','+(50+45*Math.sin(r1))+' A45,45 0 '+(sweep>180?1:0)+' 0 '+(50+45*Math.cos(r2))+','+(50+45*Math.sin(r2))+' Z" fill="'+colors[i]+'" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>';
    svg += '<text x="'+(50+30*Math.cos(rm))+'" y="'+(50+30*Math.sin(rm))+'" text-anchor="middle" fill="white" font-size="5" font-weight="bold">'+prizes[i]+'</text>';
  });
  
  svg += '<circle cx="50" cy="50" r="8" fill="#1a1208" stroke="#ffd166" stroke-width="1.5"/>';
  document.getElementById('wheelSvg').innerHTML = svg;
}

document.getElementById('btnSpin').addEventListener('click', function() {
  if (wheelDone) return;
  
  // Afficher compte à rebours pub
  const overlay = document.getElementById('adOverlay');
  const countdown = document.getElementById('adCountdown');
  overlay.classList.add('show');
  
  let sec = 3;
  countdown.textContent = sec;
  
  const timer = setInterval(() => {
    sec--;
    countdown.textContent = sec;
    if (sec <= 0) {
      clearInterval(timer);
      overlay.classList.remove('show');
      
      // Lancer la roue
      const btn = document.getElementById('btnSpin');
      btn.disabled = true;
      btn.textContent = '🎡 Tourne...';
      
      const svg = document.getElementById('wheelSvg');
      const rotation = 360*5 + Math.random()*360;
      svg.style.transform = 'rotate('+rotation+'deg)';
      
      setTimeout(() => {
        const angle = (360 - (rotation%360))%360;
        const prizes = [5,10,15,20,25,50,100];
        const weights = [25,25,20,15,10,4,1];
        const sum = weights.reduce((a,b)=>a+b,0);
        let acc = 0, prize = 5;
        weights.forEach((w, i) => {
          const start = acc;
          acc += (w/sum)*360;
          if (angle >= start && angle < acc) prize = prizes[i];
        });
        
        pts += prize;
        wheelDone = true;
        btn.textContent = '✅ Déjà tournée';
        toast('🎉 +'+prize+' points !');
        saveAll();
        updateUI();
      }, 3500);
    }
  }, 1000);
});

// ========== TIR ==========
function shoot(zone) {
  if (shootDone) {
    toast('⚠️ Déjà tiré');
    return;
  }
  
  const zones = ['gauche','centre','droite'];
  const keeper = zones[Math.floor(Math.random()*3)];
  const el = document.getElementById('shootMsg');
  
  if (zone !== keeper) {
    const p = Math.floor(Math.random()*21)+10;
    pts += p;
    el.innerHTML = '⚽ BUT ! +'+p+' pts';
    el.style.color = '#3ddc84';
  } else {
    el.innerHTML = '😞 Arrêté !';
    el.style.color = '#ff5d4d';
  }
  shootDone = true;
  saveAll();
  updateUI();
}

// ========== SHOP ==========
function renderShop() {
  const items = [
    { id: 'extra_wheel', name: '🎡 Tour de roue', cost: 150 },
    { id: 'extra_shoot', name: '🥅 Tir au but', cost: 100 }
  ];
  
  let html = '';
  items.forEach(item => {
    html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px;background:rgba(255,255,255,0.03);border-radius:8px;margin:5px 0;">';
    html += '<span>' + item.name + '</span>';
    html += '<div><span style="color:#ffd166;">' + item.cost + ' pts</span> ';
    html += '<button class="btn-green" style="padding:6px 10px;font-size:11px;width:auto;" onclick="buyItem(\'' + item.id + '\')">Acheter</button></div>';
    html += '</div>';
  });
  document.getElementById('shopItems').innerHTML = html;
  
  let inv = '';
  if (inventory.extra_wheel > 0) {
    inv += '<div style="display:flex;justify-content:space-between;padding:8px;background:rgba(255,255,255,0.03);border-radius:8px;margin:3px 0;">';
    inv += '<span>🎡 Tour de roue x' + inventory.extra_wheel + '</span>';
    inv += '<button class="btn-yellow" style="padding:6px 10px;font-size:11px;width:auto;" onclick="useItem(\'extra_wheel\')">Utiliser</button>';
    inv += '</div>';
  }
  if (inventory.extra_shoot > 0) {
    inv += '<div style="display:flex;justify-content:space-between;padding:8px;background:rgba(255,255,255,0.03);border-radius:8px;margin:3px 0;">';
    inv += '<span>🥅 Tir au but x' + inventory.extra_shoot + '</span>';
    inv += '<button class="btn-yellow" style="padding:6px 10px;font-size:11px;width:auto;" onclick="useItem(\'extra_shoot\')">Utiliser</button>';
    inv += '</div>';
  }
  document.getElementById('inventoryList').innerHTML = inv || '<p style="color:#888;font-size:12px;">Vide</p>';
}

function buyItem(id) {
  const prices = { extra_wheel: 150, extra_shoot: 100 };
  if (pts >= prices[id]) {
    pts -= prices[id];
    inventory[id]++;
    toast('✅ Acheté !');
    saveAll();
    updateUI();
  } else {
    toast('❌ Pas assez de points');
  }
}

function useItem(id) {
  if (inventory[id] > 0) {
    inventory[id]--;
    if (id === 'extra_wheel') {
      wheelDone = false;
      document.getElementById('btnSpin').textContent = '📺 Voir pub et tourner';
      document.getElementById('btnSpin').disabled = false;
      toast('🎡 Tour de roue disponible !');
    }
    if (id === 'extra_shoot') {
      shootDone = false;
      document.getElementById('shootMsg').textContent = '';
      toast('🥅 Tir disponible !');
    }
    saveAll();
    updateUI();
  }
}

// ========== INIT ==========
drawWheel();
updateUI();
console.log('✅ PRÊT - Entre ton pseudo et clique sur JOUER');
</script>
</body>
</html>
