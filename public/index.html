<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foot Quiz Pi</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --pitch: #0d2818; --gold: #e8b84b; --white: #f3f6f1; }
        body { background: #061309; color: var(--white); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid #1f4a30; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        button { background: var(--gold); border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .option { background: #11241a; border: 1px solid #1f4a30; padding: 10px; margin: 5px 0; cursor: pointer; border-radius: 6px; }
        .option.selected { border-color: var(--gold); }
    </style>
</head>
<body>

<header style="text-align:center;">
    <h1>⚽ Foot Quiz Pi</h1>
</header>

<main>
    <div class="card" id="loginCard">
        <h2>Connexion</h2>
        <button id="loginBtn">Se connecter avec Pi</button>
    </div>

    <div class="card" id="quizCard" style="display:none;">
        <h2>Quiz du jour</h2>
        <div id="quizContainer"></div>
        <button id="submitQuizBtn" style="margin-top:10px;">Valider</button>
    </div>
</main>

<div id="toast" style="position:fixed; bottom:20px; background:var(--gold); color:#000; padding:10px; border-radius:5px; display:none;"></div>

<script>
    const API_BASE = "https://foot-quiz-pi.onrender.com";
    let currentQuiz = [];
    let selectedAnswers = [];

    // Initialisation Pi
    if (typeof Pi !== 'undefined') Pi.init({ version: "2.0", sandbox: true });

    async function loadQuiz() {
        try {
            const res = await fetch(`${API_BASE}/api/quiz`);
            currentQuiz = await res.json();
            selectedAnswers = new Array(currentQuiz.length).fill(null);
            renderQuiz();
        } catch (e) { document.getElementById('quizContainer').innerHTML = "Erreur chargement quiz."; }
    }

    function renderQuiz() {
        const container = document.getElementById('quizContainer');
        container.innerHTML = currentQuiz.map((q, qIdx) => `
            <div>
                <p>${q.question}</p>
                ${q.options.map((opt, oIdx) => `
                    <div class="option ${selectedAnswers[qIdx] === oIdx ? 'selected' : ''}" 
                         onclick="selectOption(${qIdx}, ${oIdx})">${opt}</div>
                `).join('')}
            </div>
        `).join('');
    }

    window.selectOption = (qIdx, oIdx) => {
        selectedAnswers[qIdx] = oIdx;
        renderQuiz();
    };

    document.getElementById('loginBtn').addEventListener('click', async () => {
        try {
            const auth = await Pi.authenticate(['username'], () => {});
            document.getElementById('loginCard').style.display = 'none';
            document.getElementById('quizCard').style.display = 'block';
            loadQuiz();
        } catch (e) { alert("Erreur connexion"); }
    });

    document.getElementById('submitQuizBtn').addEventListener('click', async () => {
        const res = await fetch(`${API_BASE}/api/quiz/submit`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: "user_test", answers: selectedAnswers })
        });
        const data = await res.json();
        alert("Quiz terminé ! Points : " + data.pointsEarned);
    });
</script>

</body>
</html>
