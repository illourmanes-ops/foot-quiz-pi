<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foot Quiz Pi - Test</title>
<style>
  body {
    background: #0d2818;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 20px;
  }
  button {
    background: #e8b84b;
    color: #1a1208;
    border: none;
    padding: 20px;
    font-size: 20px;
    font-weight: bold;
    border-radius: 10px;
    cursor: pointer;
    margin: 10px;
    width: 80%;
    max-width: 300px;
  }
  button:active {
    background: #ffd166;
  }
  .result {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    margin: 20px;
    border-radius: 10px;
    font-size: 18px;
  }
</style>
</head>
<body>

<h1>⚽ Foot Quiz Pi</h1>
<h2>TEST DES BOUTONS</h2>

<div class="result" id="result">
  👆 Clique sur un bouton ci-dessous
</div>

<button onclick="testClick('CONNEXION')">🔐 Se connecter avec Pi</button>
<button onclick="testClick('QUIZ')">📝 Test Quiz</button>
<button onclick="testClick('ROUE')">🎡 Test Roue</button>
<button onclick="testClick('TIR')">🥅 Test Tir</button>
<button onclick="testClick('PACK')">📦 Test Pack</button>

<script>
function testClick(action) {
  console.log('✅ CLIC DÉTECTÉ: ' + action);
  document.getElementById('result').innerHTML = '✅ Bouton cliqué: <strong>' + action + '</strong><br>Le clic fonctionne !';
  alert('Clic fonctionne: ' + action);
}
</script>

</body>
</html>
